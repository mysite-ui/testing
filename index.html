<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>الخطة الشهرية - iLearn</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a3a6b;--navy-dark:#102951;--navy-light:#2e5da8;
  --blue-row:#3b82cc;--yellow:#f5c518;--orange:#f7941d;--red:#c0392b;
  --white:#fff;--border:#c5d5e8;--bg:#eef3fa;--text:#1a2840;
  --muted:#6b7a99;--cell-bg:#f7faff;--link:#0066cc;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px;direction:rtl;text-align:right;}
.topbar{background:var(--navy-dark);padding:10px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 12px rgba(16,41,81,.35);}
.topbar-brand{display:flex;align-items:center;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn{font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;padding:9px 22px;border-radius:8px;border:none;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:8px;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-ghost{background:rgba(255,255,255,.1);color:var(--white);border:1.5px solid rgba(255,255,255,.22);}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.18);}
.btn-share{background:rgba(255,255,255,.15);color:var(--white);border:1.5px solid rgba(255,255,255,.35);font-size:13px;padding:9px 20px;}
.btn-share:hover{background:rgba(255,255,255,.25);}
.btn-export{background:linear-gradient(135deg,var(--yellow) 0%,var(--orange) 100%);color:var(--navy-dark);box-shadow:0 3px 14px rgba(245,197,24,.45);font-size:14px;padding:10px 26px;}
.btn-export:hover:not(:disabled){box-shadow:0 5px 20px rgba(245,197,24,.55);transform:translateY(-1px);background:linear-gradient(135deg,#ffd11a 0%,#f98c0a 100%);}
.page{max-width:1000px;margin:28px auto 0;padding:0 16px;display:flex;flex-direction:column;gap:14px;}
.form-card{background:var(--white);border-radius:12px;box-shadow:0 2px 16px rgba(26,58,107,.1);overflow:hidden;}
.form-card-header{background:linear-gradient(270deg,var(--navy) 0%,var(--navy-light) 100%);padding:14px 24px;display:flex;align-items:center;gap:10px;}
.form-card-header h2{color:var(--white);font-size:15px;font-weight:800;}
.form-card-header .dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);box-shadow:0 0 6px rgba(245,197,24,.6);}
.form-body{padding:20px 24px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:14px;}
@media(max-width:680px){.form-body{grid-template-columns:1fr 1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:800;color:var(--navy);}
.field input,.field select{font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;color:var(--text);background:var(--cell-bg);border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;outline:none;transition:border .15s,box-shadow .15s;width:100%;direction:rtl;text-align:right;}
.field input:focus,.field select:focus{border-color:var(--navy-light);box-shadow:0 0 0 3px rgba(46,93,168,.12);background:var(--white);}
.preview-card{background:var(--white);border-radius:12px;box-shadow:0 2px 16px rgba(26,58,107,.1);overflow:hidden;}

/* ── Template ── */
.tpl-wrap{width:100%;font-family:'Cairo',sans-serif;direction:rtl;}
.tpl-header{display:grid;grid-template-columns:220px 1fr;border-bottom:2px solid var(--border);min-height:90px;}
.tpl-logo-cell{padding:8px 14px;display:flex;align-items:center;justify-content:center;border-left:1.5px solid var(--border);background:var(--cell-bg);min-height:90px;overflow:hidden;}
.tpl-info-panel{display:flex;flex-direction:column;}
.info-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;height:100%;flex:1;}
.info-field{display:flex;flex-direction:column;border-left:1.5px solid var(--border);}
.info-field:last-child{border-left:none;}
.info-label{background:var(--navy);color:var(--white);font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:6px 4px 5px;text-align:center;}
.info-value{background:var(--white);display:flex;align-items:center;justify-content:center;padding:10px 8px;font-size:12px;font-weight:800;color:var(--red);flex:1;text-align:center;min-height:52px;}
.tpl-title-bar{background:var(--navy);color:var(--white);text-align:center;font-size:18px;font-weight:900;padding:12px;}
.tpl-grid-wrap{width:100%;overflow-x:auto;}
.tpl-grid{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;direction:rtl;}
.tpl-grid th{background:var(--cell-bg);color:var(--navy);font-weight:800;font-size:12px;text-align:center;padding:9px 6px;border:1.5px solid var(--border);word-break:break-word;}
.tpl-grid th.th-timeline{color:var(--blue-row);width:130px;}
.tpl-grid th.th-content{color:var(--blue-row);width:28%;}
.tpl-grid th.th-outcomes{color:var(--blue-row);width:30%;}
.tpl-grid th.th-homework{color:var(--blue-row);width:22%;}
.tpl-grid td{border:1px solid var(--border);vertical-align:top;padding:0;}
.week-cell{background:var(--cell-bg);color:var(--navy);font-weight:900;font-size:12px;text-align:center;width:68px;vertical-align:middle;padding:6px 4px;}
.lesson-cell{background:var(--white);color:var(--text);font-size:11px;font-weight:700;text-align:center;width:62px;vertical-align:middle;padding:6px 4px;}
.input-cell{background:var(--white);vertical-align:top;padding:6px 8px;}
.homework-container,.assessment-container{display:flex;flex-direction:column;gap:5px;}
.input-cell textarea,#assessment{font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;color:var(--text);background:transparent;border:none;outline:none;width:100%;min-height:44px;padding:0;resize:none;line-height:1.7;overflow:hidden;direction:rtl;text-align:right;}
.input-cell textarea:focus,#assessment:focus{background:#eff6ff;}
#assessment{min-height:60px;}

/* ── URL Widget ── */
.url-widget{width:100%;}
.url-inp{font-family:'Cairo',sans-serif;font-size:11px;color:var(--link);background:#f8fcff;padding:5px 8px;border:1px dashed #c5d5e8;border-radius:5px;width:100%;direction:ltr;text-align:left;outline:none;transition:border .15s;}
.url-inp:focus{border-color:var(--navy-light);background:var(--white);}
.url-inp::placeholder{color:#b8c8dc;font-size:10.5px;}
.url-display{display:none;flex-direction:row;align-items:center;gap:5px;padding:4px 8px;background:#edf5ff;border:1px solid #a0c4ff;border-radius:5px;text-decoration:none;cursor:pointer;width:100%;}
.url-display:hover{background:#ddeeff;}
.url-icon{font-size:13px;flex-shrink:0;line-height:1;}
.url-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:left;font-size:11px;color:var(--link);text-decoration:underline;}
.url-edit{flex-shrink:0;font-size:9px;color:var(--muted);padding:1px 5px;border-radius:3px;border:1px solid var(--border);background:var(--white);cursor:pointer;line-height:1.7;white-space:nowrap;}
.url-edit:hover{background:var(--cell-bg);color:var(--navy);}

/* ── Share modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(10,20,50,.55);z-index:800;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:14px;padding:28px 28px 24px;max-width:480px;width:90%;box-shadow:0 16px 60px rgba(10,20,50,.3);transform:translateY(12px);transition:transform .2s;}
.modal-backdrop.open .modal{transform:translateY(0);}
.modal h3{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:6px;}
.modal p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
.share-row{display:flex;gap:8px;align-items:stretch;}
.share-inp{flex:1;font-family:'Cairo',sans-serif;font-size:11px;color:var(--text);background:var(--cell-bg);border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;outline:none;direction:ltr;text-align:left;cursor:text;}
.share-inp:focus{border-color:var(--navy-light);}
.btn-copy{font-family:'Cairo',sans-serif;font-size:12px;font-weight:800;padding:9px 18px;border-radius:7px;border:none;cursor:pointer;background:var(--navy);color:var(--white);white-space:nowrap;transition:background .15s;}
.btn-copy:hover{background:var(--navy-light);}
.btn-copy.copied{background:#14532d;}
.modal-close{position:absolute;top:14px;left:18px;font-size:20px;background:none;border:none;cursor:pointer;color:var(--muted);line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-wrap{position:relative;}

.tpl-assess-bar{background:var(--yellow);color:var(--navy-dark);font-size:15px;font-weight:900;text-align:center;padding:10px;}
.tpl-assess-body{padding:10px 14px;min-height:64px;border-top:1px solid var(--border);}
.tpl-footer{background:var(--white);border-top:2px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:center;}
.action-bar{background:var(--white);border-top:2px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.action-right{display:flex;gap:10px;align-items:center;}
.spin{display:inline-block;width:14px;height:14px;border:2.5px solid rgba(26,40,64,.2);border-top-color:var(--navy-dark);border-radius:50%;animation:spinning .65s linear infinite;}
@keyframes spinning{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:24px;z-index:999;background:var(--navy-dark);color:var(--white);padding:11px 20px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;box-shadow:0 6px 24px rgba(16,41,81,.4);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:#14532d;border-right:4px solid #22c55e;}
.toast.error{background:#7f1d1d;border-right:4px solid var(--red);}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-brand"></div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="handleReset()">&#x21BA; مسح</button>
    <button class="btn btn-share" onclick="handleShare()">&#x1F517; مشاركة</button>
    <button class="btn btn-export" id="exportBtn" onclick="handleExport()">&#x2193; تصدير PDF</button>
  </div>
</nav>

<!-- Share modal -->
<div class="modal-backdrop" id="shareModal" onclick="closeShareModal(event)">
  <div class="modal modal-wrap">
    <button class="modal-close" onclick="document.getElementById('shareModal').classList.remove('open')">&#x2715;</button>
    <h3>&#x1F517; مشاركة الخطة</h3>
    <p>أ</p>
    <div class="share-row">
      <input class="share-inp" id="shareInp" type="text" readonly value="" onclick="this.select()"/>
      <button class="btn-copy" id="copyBtn" onclick="copyShareLink()">نسخ</button>
    </div>
  </div>
</div>

<div class="page">

  <div class="form-card">
    <div class="form-card-header">
      <div class="dot"></div>
      <h2>تفاصيل الخطة</h2>
    </div>
    <div class="form-body">
      <div class="field"><label>اسم الطالب</label><input id="studentName" type="text" placeholder="اسم الطالب" value=""/></div>
      <div class="field"><label>الصف</label><select id="grade"></select></div>
      <div class="field"><label>الشهر</label><select id="month"></select></div>
      <div class="field"><label>المادة</label><select id="subject">
        <option value="اللغة الإنجليزية">اللغة الإنجليزية</option>
        <option value="اللغة العربية">اللغة العربية</option>
        <option value="القرآن الكريم">القرآن الكريم</option>
        <option value="الرياضيات">الرياضيات</option>
        <option value="العلوم">العلوم</option>
        <option value="الدراسات الاجتماعية">الدراسات الاجتماعية</option>
        <option value="التربية الإسلامية">التربية الإسلامية</option>
      </select></div>
      <div class="field"><label>السنة</label><input id="year" type="number" min="2020" max="2099" placeholder="2025"/></div>
    </div>
  </div>

  <div class="preview-card">
    <div class="tpl-wrap" id="tplWrap">

      <div class="tpl-header">
        <div class="tpl-logo-cell">
          <div style="width:120px;height:60px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;font-weight:700;text-align:center;">الشعار هنا</div>
        </div>
        <div class="tpl-info-panel">
          <div class="info-row">
            <div class="info-field"><div class="info-label">اسم الطالب</div><div class="info-value" id="preview-name">—</div></div>
            <div class="info-field"><div class="info-label">الشهر</div><div class="info-value" id="preview-month">—</div></div>
            <div class="info-field"><div class="info-label">المادة</div><div class="info-value" id="preview-subject">—</div></div>
            <div class="info-field"><div class="info-label">الصف</div><div class="info-value" id="preview-grade">—</div></div>
          </div>
        </div>
      </div>

      <div class="tpl-title-bar">الخطة الشهرية</div>

      <div class="tpl-grid-wrap">
        <table class="tpl-grid">
          <colgroup><col style="width:68px"/><col style="width:62px"/><col/><col/><col/></colgroup>
          <thead>
            <tr>
              <th class="th-timeline" colspan="2">الجدول الزمني</th>
              <th class="th-content">المحتوى</th>
              <th class="th-outcomes">نواتج التعلم</th>
              <th class="th-homework">الواجب المنزلي</th>
            </tr>
          </thead>
          <tbody id="planBody"></tbody>
        </table>
      </div>

      <div class="tpl-assess-bar">التقييم</div>
      <div class="tpl-assess-body">
        <div class="assessment-container">
          <textarea id="assessment" placeholder="اكتب التقييم الشهري، نقاط القوة، الأهداف والملاحظات…"></textarea>
          <div class="url-widget" id="assessUrlWidget">
            <input class="url-inp" type="url" placeholder="أضف رابطاً للتقييم (اختياري)" />
            <a class="url-display" href="#" target="_blank" rel="noopener">
              <span class="url-icon">🔗</span>
              <span class="url-label"></span>
              <span class="url-edit">تعديل</span>
            </a>
          </div>
        </div>
      </div>

      <div class="tpl-footer">
        <div style="height:56px;line-height:56px;color:var(--muted);font-size:13px;">معلومات الاتصال هنا</div>
      </div>

    </div>

    <div class="action-bar">
      <div></div>
      <div class="action-right">
        <button class="btn btn-ghost" style="color:var(--navy);border-color:var(--border);" onclick="handleReset()">مسح الكل</button>
        <button class="btn btn-share" style="color:var(--navy);border-color:var(--border);background:#f0f5ff;" onclick="handleShare()">&#x1F517; مشاركة</button>
        <button class="btn btn-export" id="exportBtn2" onclick="handleExport()">&#x2193; تصدير PDF</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Dropdowns ─────────────────────────────────────────────────────────────────
const MONTHS_AR=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const gradeEl=document.getElementById('grade');
const monthEl=document.getElementById('month');
for(let g=1;g<=12;g++){const o=document.createElement('option');o.value=g;o.textContent='الصف '+g;if(g===5)o.selected=true;gradeEl.appendChild(o);}
MONTHS_AR.forEach((m,i)=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(i===new Date().getMonth())o.selected=true;monthEl.appendChild(o);});
document.getElementById('year').value=new Date().getFullYear();

// ── Grid state ────────────────────────────────────────────────────────────────
const grid=[];
for(let w=1;w<=4;w++) for(let l=1;l<=2;l++)
  grid.push({week:w,lesson:l,content:'',outcomes:'',homeworkText:'',homeworkUrl:''});

// ── Helpers ───────────────────────────────────────────────────────────────────
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function resizeAll(){document.querySelectorAll('#planBody textarea,#assessment').forEach(autoResize);}

// ── Get element offset relative to an ancestor (scroll-independent) ──────────
function offsetRelTo(el, ancestor){
  let top=0, left=0;
  while(el && el!==ancestor){
    top+=el.offsetTop;
    left+=el.offsetLeft;
    el=el.offsetParent;
  }
  return {top, left};
}

// ── URL Widget ────────────────────────────────────────────────────────────────
function wireUrlWidget(widget, onChange){
  const inp    = widget.querySelector('.url-inp');
  const disp   = widget.querySelector('.url-display');
  const label  = widget.querySelector('.url-label');
  const editBtn= widget.querySelector('.url-edit');

  function normalise(v){
    v=(v||'').trim();
    if(v && !/^https?:\/\//i.test(v)) v='https://'+v;
    return v;
  }
  function showLink(url){
    disp.href=url; label.textContent=url;
    inp.style.display='none'; disp.style.display='flex';
    if(onChange) onChange(url);
  }
  function showInput(){
    disp.style.display='none'; inp.style.display='';
    if(onChange) onChange('');
  }
  function commit(){
    const url=normalise(inp.value);
    if(url){ inp.value=url; showLink(url); } else showInput();
  }

  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();commit();} });
  editBtn.addEventListener('click', e=>{
    e.preventDefault(); e.stopPropagation();
    inp.value=(disp.href==='#'||disp.href===location.href+'#')?'':disp.href;
    showInput();
  });

  widget.getUrl=()=>(disp.style.display==='flex'&&disp.href!=='#'&&!disp.href.endsWith('#'))?disp.href:'';
  widget.setUrl=(url)=>{ if(url){inp.value=url;showLink(url);}else{inp.value='';showInput();} };
  showInput(); // init inline styles
}

wireUrlWidget(document.getElementById('assessUrlWidget'));

// ── Build grid ────────────────────────────────────────────────────────────────
function buildGrid(){
  const tbody=document.getElementById('planBody');
  tbody.innerHTML='';
  for(let w=1;w<=4;w++){
    for(let l=1;l<=2;l++){
      const idx=(w-1)*2+(l-1);
      const item=grid[idx];
      const row=document.createElement('tr');
      if(l===1){
        const wc=document.createElement('td');
        wc.className='week-cell';wc.rowSpan=2;wc.textContent='الأسبوع '+w;
        row.appendChild(wc);
      }
      const lc=document.createElement('td');lc.className='lesson-cell';lc.textContent='الدرس '+l;row.appendChild(lc);

      ['content','outcomes'].forEach(key=>{
        const td=document.createElement('td');td.className='input-cell';
        const ta=document.createElement('textarea');
        ta.placeholder=key==='content'?'الموضوع…':'سيكون الطالب قادراً على…';
        ta.value=item[key];
        ta.addEventListener('input',e=>{item[key]=e.target.value;autoResize(e.target);});
        td.appendChild(ta);row.appendChild(td);
      });

      const tdHw=document.createElement('td');tdHw.className='input-cell';
      const cont=document.createElement('div');cont.className='homework-container';
      const taHw=document.createElement('textarea');
      taHw.placeholder='الواجب…';taHw.value=item.homeworkText;
      taHw.addEventListener('input',e=>{item.homeworkText=e.target.value;autoResize(e.target);});

      const wgt=document.createElement('div');wgt.className='url-widget';
      const wInp=document.createElement('input');wInp.className='url-inp';wInp.type='url';wInp.placeholder='أضف رابطاً (اختياري)';
      const wA=document.createElement('a');wA.className='url-display';wA.href='#';wA.target='_blank';wA.rel='noopener';
      const wIcon=document.createElement('span');wIcon.className='url-icon';wIcon.textContent='🔗';
      const wLabel=document.createElement('span');wLabel.className='url-label';
      const wEdit=document.createElement('span');wEdit.className='url-edit';wEdit.textContent='تعديل';
      wA.appendChild(wIcon);wA.appendChild(wLabel);wA.appendChild(wEdit);
      wgt.appendChild(wInp);wgt.appendChild(wA);
      wireUrlWidget(wgt, url=>{ item.homeworkUrl=url; });
      if(item.homeworkUrl) wgt.setUrl(item.homeworkUrl);

      cont.appendChild(taHw);cont.appendChild(wgt);
      tdHw.appendChild(cont);row.appendChild(tdHw);
      tbody.appendChild(row);
    }
  }
  resizeAll();
}
buildGrid();

// ── Preview sync ──────────────────────────────────────────────────────────────
function syncPreview(){
  document.getElementById('preview-name').textContent=document.getElementById('studentName').value||'—';
  document.getElementById('preview-month').textContent=document.getElementById('month').value||'—';
  document.getElementById('preview-subject').textContent=document.getElementById('subject').value||'—';
  document.getElementById('preview-grade').textContent='الصف '+document.getElementById('grade').value;
}
['studentName','grade','month','subject','year'].forEach(id=>{
  document.getElementById(id).addEventListener('input',syncPreview);
  document.getElementById(id).addEventListener('change',syncPreview);
});
syncPreview();

// ── Collect / restore full state ──────────────────────────────────────────────
function collectState(){
  return {
    studentName: document.getElementById('studentName').value,
    grade:       document.getElementById('grade').value,
    month:       document.getElementById('month').value,
    subject:     document.getElementById('subject').value,
    year:        document.getElementById('year').value,
    assessment:  document.getElementById('assessment').value,
    assessUrl:   document.getElementById('assessUrlWidget').getUrl(),
    grid:        grid.map(r=>({content:r.content,outcomes:r.outcomes,homeworkText:r.homeworkText,homeworkUrl:r.homeworkUrl}))
  };
}
function applyState(s){
  if(!s) return;
  if(s.studentName!==undefined) document.getElementById('studentName').value=s.studentName;
  if(s.grade!==undefined)       document.getElementById('grade').value=s.grade;
  if(s.month!==undefined)       document.getElementById('month').value=s.month;
  if(s.subject!==undefined)     document.getElementById('subject').value=s.subject;
  if(s.year!==undefined)        document.getElementById('year').value=s.year;
  if(s.assessment!==undefined)  document.getElementById('assessment').value=s.assessment;
  if(s.assessUrl)               document.getElementById('assessUrlWidget').setUrl(s.assessUrl);
  if(s.grid && s.grid.length===grid.length){
    s.grid.forEach((r,i)=>Object.assign(grid[i],r));
  }
  buildGrid();
  syncPreview();
}

// ── URL hash encode/decode ────────────────────────────────────────────────────
function stateToHash(s){
  try{ return '#v1:'+btoa(unescape(encodeURIComponent(JSON.stringify(s)))); }
  catch(e){ return ''; }
}
function hashToState(hash){
  try{
    if(!hash||!hash.startsWith('#v1:')) return null;
    return JSON.parse(decodeURIComponent(escape(atob(hash.slice(4)))));
  }catch(e){ return null; }
}

// ── Restore from URL hash on load ─────────────────────────────────────────────
(function(){
  const s=hashToState(location.hash);
  if(s) applyState(s);
})();

// ── Reset ─────────────────────────────────────────────────────────────────────
function handleReset(){
  document.getElementById('studentName').value='';
  document.getElementById('grade').value=5;
  document.getElementById('month').value=MONTHS_AR[new Date().getMonth()];
  document.getElementById('subject').value='اللغة الإنجليزية';
  document.getElementById('year').value=new Date().getFullYear();
  document.getElementById('assessment').value='';
  document.getElementById('assessUrlWidget').setUrl('');
  grid.forEach(r=>{r.content='';r.outcomes='';r.homeworkText='';r.homeworkUrl='';});
  buildGrid(); syncPreview();
  history.replaceState(null,'',location.pathname+location.search);
  showToast('تم المسح','success');
}

// ── Share ─────────────────────────────────────────────────────────────────────
function handleShare(){
  const hash=stateToHash(collectState());
  const url=location.origin+location.pathname+location.search+hash;
  document.getElementById('shareInp').value=url;
  document.getElementById('copyBtn').textContent='نسخ';
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('shareModal').classList.add('open');
}
function closeShareModal(e){
  if(e.target===document.getElementById('shareModal'))
    document.getElementById('shareModal').classList.remove('open');
}
function copyShareLink(){
  const inp=document.getElementById('shareInp');
  inp.select();
  navigator.clipboard.writeText(inp.value).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='✓ تم النسخ';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='نسخ';btn.classList.remove('copied');},2200);
  }).catch(()=>{
    document.execCommand('copy');
    showToast('تم نسخ الرابط','success');
  });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='toast',2800);
}

// ── PDF Export ────────────────────────────────────────────────────────────────
async function handleExport(){
  const name=document.getElementById('studentName').value.trim();
  if(!name){showToast('الرجاء إدخال اسم الطالب','error');return;}

  const btns=[document.getElementById('exportBtn'),document.getElementById('exportBtn2')];
  btns.forEach(b=>{b.disabled=true;b.innerHTML='<span class="spin"></span> جارٍ الإنشاء…';});

  // A4 landscape: 841.89 × 595.28 pt  →  at 96dpi: 1122.5 × 793.7 px
  const A4_W_PX=1123;
  const A4_H_PX=794;

  try{
    const wrap=document.getElementById('tplWrap');

    const canvas=await html2canvas(wrap,{
      scale:2,
      useCORS:true,
      allowTaint:false,
      backgroundColor:'#ffffff',
      logging:false,
      windowWidth:A4_W_PX,
      width:A4_W_PX,
      height:A4_H_PX,
      onclone(clonedDoc, clonedEl){
        clonedEl.style.cssText+=(
          ';width:'+A4_W_PX+'px!important'+
          ';min-width:'+A4_W_PX+'px!important'+
          ';max-width:'+A4_W_PX+'px!important'+
          ';height:'+A4_H_PX+'px!important'+
          ';overflow:hidden!important'+
          ';box-sizing:border-box!important'
        );
        clonedDoc.querySelectorAll('.tpl-grid-wrap').forEach(e=>{e.style.overflow='visible';e.style.width='100%';});
        clonedEl.style.fontSize='11px';

        // Textareas → divs
        clonedDoc.querySelectorAll('textarea').forEach(ta=>{
          const div=clonedDoc.createElement('div');
          div.style.cssText='font-family:Cairo,sans-serif;font-size:11px;font-weight:600;color:#1a2840;line-height:1.5;white-space:pre-wrap;word-break:break-word;width:100%;padding:0;direction:rtl;text-align:right;background:transparent;';
          div.textContent=ta.value;
          ta.parentNode.replaceChild(div,ta);
        });

        // URL widgets
        clonedDoc.querySelectorAll('.url-widget').forEach(wgt=>{
          const inp=wgt.querySelector('.url-inp');
          const disp=wgt.querySelector('.url-display');
          if(inp) inp.style.display='none';
          if(!disp||disp.style.display!=='flex'){ wgt.style.display='none'; return; }
          disp.style.cssText='display:flex;align-items:center;gap:4px;padding:3px 6px;background:#edf5ff;border:1px solid #a0c4ff;border-radius:4px;text-decoration:none;width:100%;';
          const lbl=disp.querySelector('.url-label');
          if(lbl) lbl.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:left;font-size:10px;color:#0066cc;text-decoration:underline;';
          const icon=disp.querySelector('.url-icon');
          if(icon) icon.style.cssText='font-size:11px;flex-shrink:0;';
          const edit=disp.querySelector('.url-edit');
          if(edit) edit.style.display='none'; // hide "تعديل" in PDF
        });
      }
    });

    const imgData=canvas.toDataURL('image/jpeg',0.96);
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
    const PW=doc.internal.pageSize.getWidth();   // 841.89
    const PH=doc.internal.pageSize.getHeight();  // 595.28

    // Fill page edge-to-edge
    doc.addImage(imgData,'JPEG',0,0,PW,PH);

    // ── Link annotations ──────────────────────────────────────────────────────
    // Map from DOM layout (at live width) → clone layout (A4_W_PX wide) → PDF pts
    // Use offsetTop/Left relative to tplWrap — scroll-independent, no viewport bias
    const liveW=wrap.offsetWidth;
    const liveH=wrap.offsetHeight;
    // Scale factors: live DOM px → clone px → PDF pt
    const scaleX=(A4_W_PX/liveW)*(PW/A4_W_PX);  // simplifies to PW/liveW
    const scaleY=(A4_H_PX/liveH)*(PH/A4_H_PX);  // simplifies to PH/liveH

    function addLink(domEl, url){
      if(!domEl||!url) return;
      const pos=offsetRelTo(domEl, wrap);
      const pdfX=pos.left*scaleX;
      const pdfY=pos.top*scaleY;
      const pdfW=domEl.offsetWidth*scaleX;
      const pdfH=Math.max(domEl.offsetHeight*scaleY, 12);
      doc.link(pdfX, pdfY, pdfW, pdfH, {url});
    }

    wrap.querySelectorAll('.url-display').forEach(a=>{
      if(a.style.display==='flex'){
        const url=a.href;
        if(url&&url!=='#'&&!url.endsWith('#')) addLink(a,url);
      }
    });

    doc.save('خطة-شهرية-'+name.replace(/\s+/g,'-')+'.pdf');
    showToast('تم التصدير بنجاح','success');

  }catch(err){
    console.error('Export error:',err);
    showToast('حدث خطأ أثناء التصدير','error');
  }

  btns.forEach(b=>{b.disabled=false;b.innerHTML='&#x2193; تصدير PDF';});
}
</script>
</body>
