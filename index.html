<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخطة الشهرية - iLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #1a3a6b; --navy-dark: #102951; --navy-light: #2e5da8;
            --blue-row: #3b82cc; --yellow: #f5c518; --orange: #f7941d; --red: #c0392b;
            --white: #fff; --border: #c5d5e8; --bg: #eef3fa; --text: #1a2840;
            --muted: #6b7a99; --cell-bg: #f7faff; --link: #0066cc;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 60px;
            direction: rtl;
            text-align: right;
        }
        .topbar { background: var(--navy-dark); padding: 10px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 3px 12px rgba(16,41,81,.35); }
        .btn { font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700; padding: 9px 22px; border-radius: 8px; border: none; cursor: pointer; transition: all .18s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:active { transform: scale(.97); }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn-ghost { background: rgba(255,255,255,.1); color: var(--white); border: 1.5px solid rgba(255,255,255,.22); }
        .btn-share { background: rgba(255,255,255,.15); color: var(--white); border: 1.5px solid rgba(255,255,255,.35); }
        .btn-export { background: linear-gradient(135deg, var(--yellow) 0%, var(--orange) 100%); color: var(--navy-dark); box-shadow: 0 3px 14px rgba(245,197,24,.45); }
        .page { max-width: 1000px; margin: 28px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }
        .form-card, .preview-card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 16px rgba(26,58,107,.1); overflow: hidden; }
        .form-card-header { background: linear-gradient(270deg, var(--navy) 0%, var(--navy-light) 100%); padding: 14px 24px; display: flex; align-items: center; gap: 10px; color: var(--white); font-weight: 800; }
        .form-body { padding: 20px 24px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 14px; }
        @media (max-width: 680px) { .form-body { grid-template-columns: 1fr 1fr; } }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 11px; font-weight: 800; color: var(--navy); }
        .field input, .field select { font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600; background: var(--cell-bg); border: 1.5px solid var(--border); border-radius: 7px; padding: 8px 11px; width: 100%; direction: rtl; }
        .tpl-wrap { width: 100%; font-family: 'Cairo', sans-serif; direction: rtl; }
        .tpl-header { display: grid; grid-template-columns: 220px 1fr; border-bottom: 2px solid var(--border); min-height: 90px; }
        .info-label { background: var(--navy); color: var(--white); font-size: 9.5px; font-weight: 800; padding: 6px 4px; text-align: center; }
        .info-value { background: var(--white); font-size: 12px; font-weight: 800; color: var(--red); padding: 10px 8px; text-align: center; }
        .tpl-title-bar { background: var(--navy); color: var(--white); font-size: 18px; font-weight: 900; padding: 12px; text-align: center; }
        .tpl-grid { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        .tpl-grid th { background: var(--cell-bg); color: var(--navy); font-weight: 800; padding: 9px 6px; border: 1.5px solid var(--border); }
        .week-cell, .lesson-cell { background: var(--cell-bg); color: var(--navy); font-weight: 900; font-size: 12px; text-align: center; padding: 6px 4px; }
        .input-cell { padding: 6px 8px; }
        .input-cell textarea, #assessment { font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600; background: transparent; border: none; outline: none; width: 100%; min-height: 44px; resize: none; line-height: 1.7; direction: rtl; }
        .url-widget { width: 100%; }
        .url-inp { font-family: 'Cairo', sans-serif; font-size: 11px; color: var(--link); background: #f8fcff; padding: 5px 8px; border: 1px dashed #c5d5e8; border-radius: 5px; width: 100%; direction: ltr; }
        .url-display { display: none; flex-direction: row; align-items: center; gap: 5px; padding: 4px 8px; background: #edf5ff; border: 1px solid #a0c4ff; border-radius: 5px; width: 100%; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(10,20,50,.55); z-index: 800; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; }
        .modal-backdrop.open { opacity: 1; pointer-events: all; }
        .modal { background: var(--white); border-radius: 14px; padding: 28px; max-width: 480px; width: 90%; box-shadow: 0 16px 60px rgba(10,20,50,.3); }
        .share-row { display: flex; gap: 8px; }
        .share-inp { flex: 1; font-size: 11px; background: var(--cell-bg); border: 1.5px solid var(--border); border-radius: 7px; padding: 9px 12px; direction: ltr; }
        .btn-copy { font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 800; padding: 9px 18px; border-radius: 7px; background: var(--navy); color: var(--white); }
        .toast { position: fixed; bottom: 24px; left: 24px; z-index: 999; background: var(--navy-dark); color: var(--white); padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; opacity: 0; transition: all .25s; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<nav class="topbar">
    <div class="topbar-right">
        <button class="btn btn-ghost" onclick="handleReset()">↺ مسح</button>
        <button class="btn btn-share" onclick="handleShare()">🔗 مشاركة</button>
        <button class="btn btn-export" id="exportBtn" onclick="handleExport()">↓ PDF</button>
    </div>
</nav>

<!-- Share Modal -->
<div class="modal-backdrop" id="shareModal" onclick="closeShareModal(event)">
    <div class="modal">
        <button class="modal-close" onclick="document.getElementById('shareModal').classList.remove('open')">✕</button>
        <h3>🔗 مشاركة الخطة</h3>
        <p>أرسل هذا الرابط — الخطة تفتح كاملة جاهزة للتعديل</p>
        <div class="share-row">
            <input class="share-inp" id="shareInp" readonly onclick="this.select()">
            <button class="btn-copy" id="copyBtn" onclick="copyShareLink()">نسخ</button>
        </div>
    </div>
</div>

<div class="page">
    <div class="form-card">
        <div class="form-card-header">
            <div class="dot"></div>
            <h2>تفاصيل الخطة</h2>
        </div>
        <div class="form-body">
            <div class="field"><label>اسم الطالب</label><input id="studentName" placeholder="اسم الطالب"></div>
            <div class="field"><label>الصف</label><select id="grade"></select></div>
            <div class="field"><label>الشهر</label><select id="month"></select></div>
            <div class="field"><label>المادة</label>
                <select id="subject">
                    <option value="اللغة الإنجليزية">اللغة الإنجليزية</option>
                    <option value="اللغة العربية">اللغة العربية</option>
                    <option value="القرآن الكريم">القرآن الكريم</option>
                    <option value="الرياضيات">الرياضيات</option>
                    <option value="العلوم">العلوم</option>
                    <option value="الدراسات الاجتماعية">الدراسات الاجتماعية</option>
                    <option value="التربية الإسلامية">التربية الإسلامية</option>
                </select>
            </div>
            <div class="field"><label>السنة</label><input id="year" type="number" value="2025"></div>
        </div>
    </div>

    <div class="preview-card">
        <div class="tpl-wrap" id="tplWrap">
            <!-- التصميم الداخلي كامل (نفس السابق) -->
            <div class="tpl-header">
                <div class="tpl-logo-cell">
                    <div style="width:120px;height:60px;border:2px dashed #c5d5e8;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6b7a99;font-size:11px">الشعار هنا</div>
                </div>
                <div class="tpl-info-panel">
                    <div class="info-row">
                        <div class="info-field"><div class="info-label">اسم الطالب</div><div class="info-value" id="preview-name">—</div></div>
                        <div class="info-field"><div class="info-label">الشهر</div><div class="info-value" id="preview-month">—</div></div>
                        <div class="info-field"><div class="info-label">المادة</div><div class="info-value" id="preview-subject">—</div></div>
                        <div class="info-field"><div class="info-label">الصف</div><div class="info-value" id="preview-grade">—</div></div>
                    </div>
                </div>
            </div>
            <div class="tpl-title-bar">الخطة الشهرية</div>
            <div class="tpl-grid-wrap">
                <table class="tpl-grid">
                    <thead>
                        <tr>
                            <th colspan="2">الجدول الزمني</th>
                            <th>المحتوى</th>
                            <th>نواتج التعلم</th>
                            <th>الواجب المنزلي</th>
                        </tr>
                    </thead>
                    <tbody id="planBody"></tbody>
                </table>
            </div>
            <div class="tpl-assess-bar">التقييم</div>
            <div class="tpl-assess-body">
                <textarea id="assessment" placeholder="اكتب التقييم الشهري..."></textarea>
                <div class="url-widget" id="assessUrlWidget">
                    <input class="url-inp" type="url" placeholder="أضف رابطاً (اختياري)">
                    <a class="url-display" href="#" target="_blank">
                        <span class="url-icon">🔗</span>
                        <span class="url-label"></span>
                        <span class="url-edit">تعديل</span>
                    </a>
                </div>
            </div>
            <div class="tpl-footer">
                <div style="height:56px;color:#6b7a99;font-size:13px">معلومات الاتصال هنا</div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-ghost" onclick="handleReset()">مسح الكل</button>
            <button class="btn btn-share" onclick="handleShare()">🔗 مشاركة</button>
            <button class="btn btn-export" id="exportBtn2" onclick="handleExport()">↓ PDF</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ── Dropdowns ─────────────────────────────────────────────────────────────
    const MONTHS_AR = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
    const grid = [];
    for (let w = 1; w <= 4; w++) {
        for (let l = 1; l <= 2; l++) {
            grid.push({ week: w, lesson: l, content: "", outcomes: "", homeworkText: "", homeworkUrl: "" });
        }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function autoResize(ta) { ta.style.height = "auto"; ta.style.height = ta.scrollHeight + "px"; }
    function resizeAll() { document.querySelectorAll("#planBody textarea, #assessment").forEach(autoResize); }

    // ── URL Widget ────────────────────────────────────────────────────────────
    function wireUrlWidget(widget, onChange) {
        const inp = widget.querySelector(".url-inp");
        const disp = widget.querySelector(".url-display");
        const label = disp.querySelector(".url-label");
        const editBtn = disp.querySelector(".url-edit");

        function normalise(v) {
            v = (v || "").trim();
            if (v && !/^https?:\/\//i.test(v)) v = "https://" + v;
            return v;
        }
        function showLink(url) {
            disp.href = url; label.textContent = url;
            inp.style.display = "none"; disp.style.display = "flex";
            if (onChange) onChange(url);
        }
        function showInput() {
            disp.style.display = "none"; inp.style.display = "";
            if (onChange) onChange("");
        }
        function commit() {
            const url = normalise(inp.value);
            url ? showLink(url) : showInput();
        }
        inp.addEventListener("blur", commit);
        inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); commit(); } });
        editBtn.addEventListener("click", e => {
            e.preventDefault();
            inp.value = disp.href && disp.href !== "#" ? disp.href : "";
            showInput();
        });
        widget.getUrl = () => (disp.style.display === "flex" && disp.href !== "#") ? disp.href : "";
        widget.setUrl = (url) => { url ? showLink(url) : showInput(); };
        showInput();
    }
    wireUrlWidget(document.getElementById("assessUrlWidget"));

    // ── Build Grid ────────────────────────────────────────────────────────────
    function buildGrid() {
        const tbody = document.getElementById("planBody");
        tbody.innerHTML = "";
        for (let w = 1; w <= 4; w++) {
            for (let l = 1; l <= 2; l++) {
                const idx = (w-1)*2 + (l-1);
                const item = grid[idx];
                const row = document.createElement("tr");
                if (l === 1) {
                    const wc = document.createElement("td");
                    wc.className = "week-cell";
                    wc.rowSpan = 2;
                    wc.textContent = "الأسبوع " + w;
                    row.appendChild(wc);
                }
                const lc = document.createElement("td");
                lc.className = "lesson-cell";
                lc.textContent = "الدرس " + l;
                row.appendChild(lc);

                ["content", "outcomes"].forEach(key => {
                    const td = document.createElement("td");
                    td.className = "input-cell";
                    const ta = document.createElement("textarea");
                    ta.placeholder = key === "content" ? "الموضوع…" : "سيكون الطالب قادراً على…";
                    ta.value = item[key];
                    ta.oninput = e => { item[key] = e.target.value; autoResize(e.target); };
                    td.appendChild(ta);
                    row.appendChild(td);
                });

                const tdHw = document.createElement("td");
                tdHw.className = "input-cell";
                const cont = document.createElement("div");
                cont.className = "homework-container";
                const taHw = document.createElement("textarea");
                taHw.placeholder = "الواجب…";
                taHw.value = item.homeworkText;
                taHw.oninput = e => { item.homeworkText = e.target.value; autoResize(e.target); };
                const wgt = document.createElement("div");
                wgt.className = "url-widget";
                const wInp = document.createElement("input");
                wInp.className = "url-inp";
                wInp.type = "url";
                wInp.placeholder = "رابط (اختياري)";
                const wA = document.createElement("a");
                wA.className = "url-display";
                wA.href = "#";
                wA.target = "_blank";
                const wIcon = document.createElement("span");
                wIcon.className = "url-icon";
                wIcon.textContent = "🔗";
                const wLabel = document.createElement("span");
                wLabel.className = "url-label";
                const wEdit = document.createElement("span");
                wEdit.className = "url-edit";
                wEdit.textContent = "تعديل";
                wA.append(wIcon, wLabel, wEdit);
                wgt.append(wInp, wA);
                wireUrlWidget(wgt, url => item.homeworkUrl = url);
                if (item.homeworkUrl) wgt.setUrl(item.homeworkUrl);
                cont.append(taHw, wgt);
                tdHw.appendChild(cont);
                row.appendChild(tdHw);
                tbody.appendChild(row);
            }
        }
        resizeAll();
    }
    buildGrid();

    // ── Sync Preview ──────────────────────────────────────────────────────────
    function syncPreview() {
        document.getElementById("preview-name").textContent = document.getElementById("studentName").value || "—";
        document.getElementById("preview-month").textContent = document.getElementById("month").value || "—";
        document.getElementById("preview-subject").textContent = document.getElementById("subject").value || "—";
        document.getElementById("preview-grade").textContent = "الصف " + document.getElementById("grade").value;
    }
    ["studentName","grade","month","subject","year"].forEach(id => {
        const el = document.getElementById(id);
        el.oninput = el.onchange = syncPreview;
    });
    syncPreview();

    // ── State Management (مع الضغط لجعل الرابط أقصر جداً) ─────────────────────
    function collectState() {
        return {
            n: document.getElementById("studentName").value,
            g: document.getElementById("grade").value,
            m: document.getElementById("month").value,
            s: document.getElementById("subject").value,
            y: document.getElementById("year").value,
            a: document.getElementById("assessment").value,
            u: document.getElementById("assessUrlWidget").getUrl(),
            d: grid.map(r => ({ c: r.content, o: r.outcomes, ht: r.homeworkText, hu: r.homeworkUrl }))
        };
    }

    function applyState(s) {
        if (!s) return;
        document.getElementById("studentName").value = s.n || "";
        document.getElementById("grade").value = s.g || 5;
        document.getElementById("month").value = s.m || MONTHS_AR[new Date().getMonth()];
        document.getElementById("subject").value = s.s || "اللغة الإنجليزية";
        document.getElementById("year").value = s.y || new Date().getFullYear();
        document.getElementById("assessment").value = s.a || "";
        document.getElementById("assessUrlWidget").setUrl(s.u || "");
        if (s.d && s.d.length === grid.length) {
            s.d.forEach((r, i) => {
                grid[i].content = r.c || "";
                grid[i].outcomes = r.o || "";
                grid[i].homeworkText = r.ht || "";
                grid[i].homeworkUrl = r.hu || "";
            });
        }
        buildGrid();
        syncPreview();
    }

    function stateToHash(s) {
        try {
            return "#v3:" + LZString.compressToBase64(JSON.stringify(s));
        } catch (e) { return ""; }
    }

    function hashToState(h) {
        try {
            if (!h) return null;
            if (h.startsWith("#v3:")) {
                const compressed = h.slice(4);
                const json = LZString.decompressFromBase64(compressed);
                return JSON.parse(json);
            }
            // دعم الإصدارات القديمة
            if (h.startsWith("#v2:")) return JSON.parse(LZString.decompressFromBase64(h.slice(4)));
            if (h.startsWith("#v1:")) return JSON.parse(decodeURIComponent(escape(atob(h.slice(4)))));
            return null;
        } catch (e) { console.warn(e); return null; }
    }

    // Load from URL
    (function() {
        const state = hashToState(location.hash);
        if (state) applyState(state);
    })();

    // ── Reset ─────────────────────────────────────────────────────────────────
    function handleReset() {
        document.getElementById("studentName").value = "";
        document.getElementById("grade").value = 5;
        document.getElementById("month").value = MONTHS_AR[new Date().getMonth()];
        document.getElementById("subject").value = "اللغة الإنجليزية";
        document.getElementById("year").value = new Date().getFullYear();
        document.getElementById("assessment").value = "";
        document.getElementById("assessUrlWidget").setUrl("");
        grid.forEach(r => { r.content = ""; r.outcomes = ""; r.homeworkText = ""; r.homeworkUrl = ""; });
        buildGrid();
        syncPreview();
        history.replaceState(null, "", location.pathname);
        showToast("تم المسح", "success");
    }

    // ── Share (الرابط الآن أقصر جداً) ─────────────────────────────────────────
    function handleShare() {
        const hash = stateToHash(collectState());
        const url = location.origin + location.pathname + hash;
        document.getElementById("shareInp").value = url;
        document.getElementById("copyBtn").textContent = "نسخ";
        document.getElementById("copyBtn").classList.remove("copied");
        document.getElementById("shareModal").classList.add("open");
    }

    function closeShareModal(e) {
        if (e.target.id === "shareModal") document.getElementById("shareModal").classList.remove("open");
    }

    function copyShareLink() {
        const inp = document.getElementById("shareInp");
        navigator.clipboard.writeText(inp.value).then(() => {
            const btn = document.getElementById("copyBtn");
            btn.textContent = "✓ تم";
            btn.classList.add("copied");
            setTimeout(() => { btn.textContent = "نسخ"; btn.classList.remove("copied"); }, 2200);
        });
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.className = "toast", 2800);
    }

    // ── Export PDF ────────────────────────────────────────────────────────────
    async function handleExport() {
        const name = document.getElementById("studentName").value.trim();
        if (!name) return showToast("أدخل اسم الطالب", "error");

        const btns = [document.getElementById("exportBtn"), document.getElementById("exportBtn2")];
        btns.forEach(b => { b.disabled = true; b.innerHTML = "جاري..."; });

        const A4W = 1123, A4H = 794;
        try {
            const wrap = document.getElementById("tplWrap");
            const canvas = await html2canvas(wrap, {
                scale: 2,
                useCORS: true,
                backgroundColor: "#fff",
                width: A4W,
                height: A4H,
                onclone(doc, el) {
                    el.style.width = A4W + "px";
                    el.style.height = A4H + "px";
                    doc.querySelectorAll("textarea").forEach(ta => {
                        const div = doc.createElement("div");
                        div.style.cssText = "font-family:Cairo,sans-serif;font-size:11px;font-weight:600;color:#1a2840;white-space:pre-wrap;word-break:break-word";
                        div.textContent = ta.value;
                        ta.replaceWith(div);
                    });
                }
            });
            const img = canvas.toDataURL("image/jpeg", 0.96);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "landscape", unit: "pt", format: "a4" });
            doc.addImage(img, "JPEG", 0, 0, doc.internal.pageSize.getWidth(), doc.internal.pageSize.getHeight());
            doc.save("خطة-شهرية-" + name.replace(/\s+/g, "-") + ".pdf");
            showToast("تم التصدير بنجاح", "success");
        } catch (e) {
            showToast("خطأ في التصدير", "error");
        }
        btns.forEach(b => { b.disabled = false; b.innerHTML = "↓ PDF"; });
    }

    // Initialize dropdowns
    const gradeEl = document.getElementById("grade");
    const monthEl = document.getElementById("month");
    for (let g = 1; g <= 12; g++) {
        const o = document.createElement("option");
        o.value = g;
        o.textContent = "الصف " + g;
        if (g === 5) o.selected = true;
        gradeEl.appendChild(o);
    }
    MONTHS_AR.forEach((m, i) => {
        const o = document.createElement("option");
        o.value = m;
        o.textContent = m;
        if (i === new Date().getMonth()) o.selected = true;
        monthEl.appendChild(o);
    });
</script>
</body>
</html>
