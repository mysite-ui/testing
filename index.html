<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iLearn Monthly Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a3a6b;--navy-dark:#102951;--navy-light:#2e5da8;
  --blue-row:#3b82cc;--yellow:#f5c518;--orange:#f7941d;--red:#c0392b;
  --white:#fff;--border:#c5d5e8;--bg:#eef3fa;--text:#1a2840;
  --muted:#6b7a99;--cell-bg:#f7faff;--link:#0066cc;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px;}

/* ── TOP NAV ── */
.topbar{background:var(--navy-dark);padding:10px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 12px rgba(16,41,81,.35);}
.topbar-brand{display:flex;align-items:center;}
.topbar-right{display:flex;align-items:center;gap:10px;}

.btn{font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;padding:9px 22px;border-radius:8px;border:none;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:8px;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-ghost{background:rgba(255,255,255,.1);color:var(--white);border:1.5px solid rgba(255,255,255,.22);}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.18);}
.btn-share{background:rgba(255,255,255,.15);color:var(--white);border:1.5px solid rgba(255,255,255,.35);font-size:13px;padding:9px 20px;}
.btn-share:hover{background:rgba(255,255,255,.25);}
.btn-export{background:linear-gradient(135deg,var(--yellow) 0%,var(--orange) 100%);color:var(--navy-dark);box-shadow:0 3px 14px rgba(245,197,24,.45);font-size:14px;padding:10px 26px;}
.btn-export:hover:not(:disabled){box-shadow:0 5px 20px rgba(245,197,24,.55);transform:translateY(-1px);background:linear-gradient(135deg,#ffd11a 0%,#f98c0a 100%);}

/* ── PAGE ── */
.page{max-width:1000px;margin:28px auto 0;padding:0 16px;display:flex;flex-direction:column;gap:14px;}

/* ── FORM CARD ── */
.form-card{background:var(--white);border-radius:12px;box-shadow:0 2px 16px rgba(26,58,107,.1);overflow:hidden;}
.form-card-header{background:linear-gradient(90deg,var(--navy) 0%,var(--navy-light) 100%);padding:14px 24px;display:flex;align-items:center;gap:10px;}
.form-card-header h2{color:var(--white);font-size:15px;font-weight:800;}
/* ── GLOWING PULSING DOT ── */
.form-card-header .dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--yellow);
  box-shadow:0 0 6px rgba(245,197,24,.6);
  animation:dot-pulse 1.8s ease-in-out infinite;
}
@keyframes dot-pulse{
  0%,100%{box-shadow:0 0 4px 1px rgba(245,197,24,.5);transform:scale(1);}
  50%{box-shadow:0 0 10px 4px rgba(245,197,24,.85);transform:scale(1.25);}
}
.form-body{padding:20px 24px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:14px;}
@media(max-width:680px){.form-body{grid-template-columns:1fr 1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--navy);}
.field input,.field select{font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;color:var(--text);background:var(--cell-bg);border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;outline:none;transition:border .15s,box-shadow .15s;width:100%;}
.field input:focus,.field select:focus{border-color:var(--navy-light);box-shadow:0 0 0 3px rgba(46,93,168,.12);background:var(--white);}
.field input.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ── PREVIEW CARD ── */
.preview-card{
  background:var(--white);
  border-radius:12px;
  box-shadow:0 2px 16px rgba(26,58,107,.1);
  overflow:hidden;
}

/* ── Animated wave pattern behind the grid ── */
.tpl-grid-wrap{
  width:100%;overflow-x:auto;
  position:relative;
  background:#f0f7ff;
}
.wave-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.wave-canvas svg{
  position:absolute;bottom:0;left:0;
  width:200%;height:100%;
  animation:wave-drift 10s linear infinite;
}
.wave-canvas svg:nth-child(2){
  animation:wave-drift 15s linear infinite reverse;
  opacity:.5;
}
@keyframes wave-drift{
  from{transform:translateX(0);}
  to  {transform:translateX(-50%);}
}
.tpl-grid{
  position:relative;z-index:1;
  width:100%;min-width:600px;border-collapse:collapse;font-size:12px;table-layout:fixed;
}
/* Make cell backgrounds semi-transparent so waves show through */
.tpl-grid td{border:1px solid var(--border);vertical-align:top;padding:0;}
.week-cell{background:rgba(247,250,255,.82);color:var(--navy);font-weight:900;font-size:12px;text-align:center;width:68px;vertical-align:middle;padding:6px 4px;word-break:keep-all;}
.lesson-cell{background:rgba(255,255,255,.75);color:var(--text);font-size:11px;font-weight:700;text-align:center;width:62px;vertical-align:middle;padding:6px 4px;word-break:keep-all;}

.tpl{width:100%;font-family:'Cairo',sans-serif;}
.tpl-header{display:grid;grid-template-columns:220px 1fr;border-bottom:2px solid var(--border);min-height:90px;}
.tpl-logo-cell{padding:8px 14px;display:flex;align-items:center;justify-content:center;border-right:1.5px solid var(--border);background:var(--cell-bg);min-height:90px;overflow:hidden;}
.tpl-logo-cell img{max-width:180px;max-height:70px;width:auto;height:auto;object-fit:contain;display:block;}
.tpl-info-panel{display:flex;flex-direction:column;}
.info-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;height:100%;flex:1;}
.info-field{display:flex;flex-direction:column;border-right:1.5px solid var(--border);}
.info-field:last-child{border-right:none;}
.info-label{background:var(--navy);color:var(--white);font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:6px 4px 5px;letter-spacing:.6px;text-transform:uppercase;}
.info-value{background:var(--white);display:flex;align-items:center;justify-content:center;padding:10px 8px;font-size:12px;font-weight:800;color:var(--red);flex:1;text-align:center;min-height:52px;}
.tpl-title-bar{background:var(--navy);color:var(--white);text-align:center;font-size:18px;font-weight:900;letter-spacing:.5px;padding:12px;}
.tpl-grid th{background:rgba(247,250,255,.85);color:var(--navy);font-weight:800;font-size:12px;text-align:center;padding:9px 6px;border:1.5px solid var(--border);letter-spacing:.3px;word-break:break-word;}
.tpl-grid th.th-timeline{color:var(--blue-row);width:130px;border-left:none;border-right:none;border-top:none;border-bottom:none;}
.tpl-grid th.th-content{color:var(--blue-row);width:28%;}
.tpl-grid th.th-outcomes{color:var(--blue-row);width:30%;}
.tpl-grid th.th-homework{color:var(--blue-row);width:22%;}
.tpl-grid td{border:1px solid var(--border);vertical-align:top;padding:0;}
.week-cell{background:var(--cell-bg);color:var(--navy);font-weight:900;font-size:12px;text-align:center;width:68px;vertical-align:middle;padding:6px 4px;word-break:keep-all;}
.lesson-cell{background:var(--white);color:var(--text);font-size:11px;font-weight:700;text-align:center;width:62px;vertical-align:middle;padding:6px 4px;word-break:keep-all;}

/* ── Input cells: padded so text doesn't touch borders ── */
.input-cell{background:rgba(255,255,255,.78);vertical-align:top;padding:7px 9px 7px 9px;}
.input-cell .homework-container{display:flex;flex-direction:column;gap:5px;}
.input-cell textarea{font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;color:var(--text);background:transparent;border:none;outline:none;width:100%;min-height:40px;padding:2px 3px;resize:none;overflow:hidden;line-height:1.55;word-break:break-word;white-space:pre-wrap;transition:background .12s;}
.input-cell textarea:focus{background:#eff6ff;border-radius:3px;}

/* ── Homework URL widget ── */
.hw-url-inp{font-family:'Cairo',sans-serif;font-size:11px;color:var(--link);background:#f0f8ff;padding:4px 7px;border:1px dashed #a0c4ff;border-radius:4px;width:100%;outline:none;transition:border .15s;}
.hw-url-inp:focus{border-color:var(--navy-light);background:var(--white);}
.hw-url-inp::placeholder{color:#b0c8e8;font-size:10.5px;}
.hw-link-disp{display:none;align-items:center;gap:5px;padding:5px 8px;background:#edf5ff;border:1px solid #a0c4ff;border-radius:5px;width:100%;margin-top:2px;}
.hw-link-anchor{flex:1;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:var(--link);text-decoration:underline;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:left;cursor:pointer;}
.hw-link-anchor:hover{color:#004499;}
.hw-edit-btn{flex-shrink:0;font-size:9px;color:var(--muted);padding:1px 5px;border-radius:3px;border:1px solid var(--border);background:var(--white);cursor:pointer;line-height:1.7;white-space:nowrap;}
.hw-edit-btn:hover{background:var(--cell-bg);color:var(--navy);}

/* ── Assessment ── */
.tpl-assess-bar{background:var(--yellow);color:var(--navy-dark);font-size:15px;font-weight:900;text-align:center;padding:10px;letter-spacing:.3px;}
.tpl-assess-body{padding:10px 14px;min-height:64px;border-top:1px solid var(--border);}
.tpl-assess-body textarea{font-family:'Cairo',sans-serif;font-size:13px;font-weight:500;color:var(--text);background:transparent;border:none;outline:none;width:100%;min-height:56px;padding:4px 0;resize:none;line-height:1.6;}

.tpl-footer{background:var(--white);border-top:2px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:center;}
.tpl-footer img{max-height:56px;width:auto;object-fit:contain;display:block;}

.action-bar{background:var(--white);border-top:2px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.action-right{display:flex;gap:10px;align-items:center;}

/* ── SHARE MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(10,20,50,.55);z-index:800;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:14px;padding:28px 28px 24px;max-width:480px;width:90%;box-shadow:0 16px 60px rgba(10,20,50,.3);transform:translateY(12px);transition:transform .2s;position:relative;}
.modal-backdrop.open .modal{transform:translateY(0);}
.modal h3{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:6px;}
.modal p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
.share-row{display:flex;gap:8px;align-items:stretch;}
.share-inp{flex:1;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);background:var(--cell-bg);border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;outline:none;direction:ltr;text-align:left;cursor:text;}
.share-inp:focus{border-color:var(--navy-light);}
.btn-copy{font-family:'Cairo',sans-serif;font-size:12px;font-weight:800;padding:9px 18px;border-radius:7px;border:none;cursor:pointer;background:var(--navy);color:var(--white);white-space:nowrap;transition:background .15s;}
.btn-copy:hover{background:var(--navy-light);}
.btn-copy.copied{background:#14532d;}
.modal-close{position:absolute;top:14px;right:18px;font-size:20px;background:none;border:none;cursor:pointer;color:var(--muted);line-height:1;}
.modal-close:hover{color:var(--text);}
.share-status{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;min-height:18px;}
.share-status.ok{color:#166534;}
.share-status.err{color:var(--red);}

/* ── Spinner / Toast ── */
.spin{display:inline-block;width:14px;height:14px;border:2.5px solid rgba(26,40,64,.2);border-top-color:var(--navy-dark);border-radius:50%;animation:spinning .65s linear infinite;}
@keyframes spinning{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--navy-dark);color:var(--white);padding:11px 20px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;box-shadow:0 6px 24px rgba(16,41,81,.4);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:#14532d;border-left:4px solid #22c55e;}
.toast.error{background:#7f1d1d;border-left:4px solid var(--red);}

/* ── Page load animations ── */
@keyframes card-enter{
  0%  { opacity:0; transform:perspective(900px) rotateX(6deg) translateY(40px); }
  100%{ opacity:1; transform:perspective(900px) rotateX(0deg) translateY(0);    }
}
.topbar{
  animation:card-enter .8s cubic-bezier(.25,.46,.45,.94) both;
}
.form-card{
  animation:card-enter .8s cubic-bezier(.25,.46,.45,.94) .18s both;
}
.preview-card{
  animation:card-enter .8s cubic-bezier(.25,.46,.45,.94) .34s both;
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topbar">
  <div class="topbar-brand"></div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="handleReset()">↺ Clear</button>
    <button class="btn btn-share" onclick="handleShare()">🔗 Share</button>
    <button class="btn btn-export" id="exportBtn" onclick="handleExport()">↓ Export PDF</button>
  </div>
</nav>

<!-- Share Modal -->
<div class="modal-backdrop" id="shareModal" onclick="closeShareModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('shareModal').classList.remove('open')">✕</button>
    <h3>🔗 Share Plan</h3>
    <p> </p>
    <div class="share-row">
      <input class="share-inp" id="shareInp" type="text" readonly value="" onclick="this.select()"/>
      <button class="btn-copy" id="copyBtn" onclick="copyShareLink()">Copy</button>
    </div>
    <div class="share-status" id="shareStatus"></div>
  </div>
</div>

<div class="page">

  <!-- FORM -->
  <div class="form-card">
    <div class="form-card-header">
      <div class="dot"></div>
      <h2>Plan Details</h2>
    </div>
    <div class="form-body">
      <div class="field"><label>Student Name</label><input id="studentName" type="text" placeholder="Student name" value=""/></div>
      <div class="field"><label>Grade</label><select id="grade"></select></div>
      <div class="field"><label>Month</label><select id="month"></select></div>
      <div class="field"><label>Subject</label>
        <select id="subject">
          <option value="English">English</option>
          <option value="Arabic">Arabic</option>
          <option value="Mathematics">Mathematics</option>
          <option value="Science">Science</option>
          <option value="Social Studies">Social Studies</option>
          <option value="Islamic Studies">Islamic Studies</option>
          <option value="Quran">Quran</option>
        </select>
      </div>
      <div class="field"><label>Year</label><input id="year" type="number" min="2020" max="2099" placeholder="2025"/></div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-card">
    <div class="tpl" id="tplWrap">

      <div class="tpl-header">
        <div class="tpl-logo-cell">
          <img src="./Logo-white(1).jpg" alt="iLearn Logo" id="headerLogoImg"
               onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'"/>
          <div id="logoFallback" style="display:none;width:120px;height:60px;border:2px dashed var(--border);border-radius:8px;align-items:center;justify-content:center;color:var(--muted);font-size:11px;font-weight:700;text-align:center;line-height:1.4;">Logo<br/>Here</div>
        </div>
        <div class="tpl-info-panel">
          <div class="info-row">
            <div class="info-field"><div class="info-label">Student Name</div><div class="info-value" id="preview-name">—</div></div>
            <div class="info-field"><div class="info-label">Month</div><div class="info-value" id="preview-month">—</div></div>
            <div class="info-field"><div class="info-label">Subject</div><div class="info-value" id="preview-subject">—</div></div>
            <div class="info-field"><div class="info-label">Grade</div><div class="info-value" id="preview-grade">—</div></div>
          </div>
        </div>
      </div>

      <div class="tpl-title-bar">Monthly Plan</div>

      <div class="tpl-grid-wrap">
        <div class="wave-canvas" aria-hidden="true">
          <svg viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="rgba(59,130,204,0.07)" d="M0,160 C120,200 240,120 360,160 C480,200 600,120 720,160 C840,200 960,120 1080,160 C1200,200 1320,120 1440,160 L1440,320 L0,320 Z"/>
            <path fill="rgba(96,180,255,0.06)" d="M0,200 C120,160 240,240 360,200 C480,160 600,240 720,200 C840,160 960,240 1080,200 C1200,160 1320,240 1440,200 L1440,320 L0,320 Z"/>
            <path fill="rgba(59,130,204,0.05)" d="M0,240 C180,200 360,280 540,240 C720,200 900,280 1080,240 C1260,200 1350,260 1440,240 L1440,320 L0,320 Z"/>
            <path fill="none" stroke="rgba(59,130,204,0.12)" stroke-width="1.5" d="M0,80 C120,50 240,110 360,80 C480,50 600,110 720,80 C840,50 960,110 1080,80 C1200,50 1320,110 1440,80"/>
            <path fill="none" stroke="rgba(96,180,255,0.10)" stroke-width="1.5" d="M0,120 C120,90 240,150 360,120 C480,90 600,150 720,120 C840,90 960,150 1080,120 C1200,90 1320,150 1440,120"/>
            <path fill="none" stroke="rgba(59,130,204,0.08)" stroke-width="1" d="M0,40 C180,20 360,60 540,40 C720,20 900,60 1080,40 C1260,20 1350,50 1440,40"/>
          </svg>
          <svg viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="rgba(96,180,255,0.05)" d="M0,180 C120,140 240,220 360,180 C480,140 600,220 720,180 C840,140 960,220 1080,180 C1200,140 1320,220 1440,180 L1440,320 L0,320 Z"/>
            <path fill="none" stroke="rgba(59,130,204,0.09)" stroke-width="1.5" d="M0,100 C120,70 240,130 360,100 C480,70 600,130 720,100 C840,70 960,130 1080,100 C1200,70 1320,130 1440,100"/>
            <path fill="none" stroke="rgba(96,180,255,0.08)" stroke-width="1" d="M0,60 C180,40 360,80 540,60 C720,40 900,80 1080,60 C1260,40 1350,70 1440,60"/>
          </svg>
        </div>
        <table class="tpl-grid">
          <colgroup>
            <col style="width:68px"/><col style="width:62px"/>
            <col/><col/><col/>
          </colgroup>
          <thead>
            <tr>
              <th class="th-timeline" colspan="2">Timeline</th>
              <th class="th-content">Content</th>
              <th class="th-outcomes">Learning Outcomes</th>
              <th class="th-homework">Homework</th>
            </tr>
          </thead>
          <tbody id="planBody"></tbody>
        </table>
      </div>

      <div class="tpl-assess-bar">Assessment</div>
      <div class="tpl-assess-body">
        <textarea id="assessment" placeholder="Write the monthly assessment, strengths, targets and notes…" rows="3"></textarea>
      </div>

      <div class="tpl-footer">
        <img src="./image1.png" alt="iLearn Contact Info" id="footerBannerImg"/>
      </div>

    </div>

    <div class="action-bar">
      <div></div>
      <div class="action-right">
        <button class="btn btn-ghost" style="color:var(--navy);border-color:var(--border);" onclick="handleReset()">Clear all</button>
        <button class="btn btn-share" style="color:var(--navy);border-color:var(--border);background:#f0f5ff;" onclick="handleShare()">🔗 Share</button>
        <button class="btn btn-export" id="exportBtn2" onclick="handleExport()">↓ Export PDF</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Dropdowns ─────────────────────────────────────────────────────────────────
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const gradeEl=document.getElementById('grade');
const monthEl=document.getElementById('month');
document.getElementById('year').value=new Date().getFullYear();
for(let g=1;g<=12;g++){const o=document.createElement('option');o.value=g;o.textContent='Grade '+g;if(g===5)o.selected=true;gradeEl.appendChild(o);}
MONTHS.forEach((m,i)=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(i===new Date().getMonth())o.selected=true;monthEl.appendChild(o);});

// ── Helpers ───────────────────────────────────────────────────────────────────
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function resizeAll(){document.querySelectorAll('.input-cell textarea,#assessment').forEach(autoResize);}

// ── Grid state ────────────────────────────────────────────────────────────────
const grid=[];
for(let w=1;w<=4;w++)for(let l=1;l<=2;l++)
  grid.push({week:w,lesson:l,content:'',outcomes:'',homeworkText:'',homeworkUrl:''});

// ── Homework URL widget ───────────────────────────────────────────────────────
function wireHomeworkWidget(cont,item){
  const ta=cont.querySelector('.hw-text');
  const urlInp=cont.querySelector('.hw-url-inp');
  const linkDisp=cont.querySelector('.hw-link-disp');
  const linkAnchor=cont.querySelector('.hw-link-anchor');
  const editBtn=cont.querySelector('.hw-edit-btn');

  function normalise(v){v=(v||'').trim();if(v&&!/^https?:\/\//i.test(v))v='https://'+v;return v;}
  function updateLabel(){linkAnchor.textContent=item.homeworkText.trim()||item.homeworkUrl;}
  function showLinkMode(){updateLabel();linkAnchor.href=item.homeworkUrl;ta.style.display='none';urlInp.style.display='none';linkDisp.style.display='flex';}
  function showEditMode(){ta.style.display='';urlInp.style.display='';linkDisp.style.display='none';autoResize(ta);}
  function commitUrl(){const url=normalise(urlInp.value);urlInp.value=url;item.homeworkUrl=url;if(url)showLinkMode();else showEditMode();}

  ta.addEventListener('input',e=>{item.homeworkText=e.target.value;autoResize(e.target);});
  urlInp.addEventListener('blur',commitUrl);
  urlInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commitUrl();}});
  editBtn.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();urlInp.value=item.homeworkUrl;showEditMode();urlInp.focus();});

  if(item.homeworkUrl){urlInp.value=item.homeworkUrl;showLinkMode();}else showEditMode();
}

// ── Build grid ────────────────────────────────────────────────────────────────
function buildGrid(){
  const tbody=document.getElementById('planBody');
  tbody.innerHTML='';
  for(let w=1;w<=4;w++){
    for(let l=1;l<=2;l++){
      const idx=(w-1)*2+(l-1);
      const item=grid[idx];
      const row=document.createElement('tr');

      if(l===1){
        const wc=document.createElement('td');wc.className='week-cell';wc.rowSpan=2;wc.textContent='Week '+w;row.appendChild(wc);
      }
      const lc=document.createElement('td');lc.className='lesson-cell';lc.textContent='Lesson '+l;row.appendChild(lc);

      ['content','outcomes'].forEach(key=>{
        const td=document.createElement('td');td.className='input-cell';
        const ta=document.createElement('textarea');
        ta.placeholder=key==='content'?'Topic…':'Students will be able to…';
        ta.value=item[key];
        ta.addEventListener('input',e=>{item[key]=e.target.value;autoResize(e.target);});
        td.appendChild(ta);row.appendChild(td);
      });

      // Homework: textarea + url widget
      const tdHw=document.createElement('td');tdHw.className='input-cell';
      const cont=document.createElement('div');cont.className='homework-container';
      const taHw=document.createElement('textarea');taHw.className='hw-text';taHw.placeholder='Assignment…';taHw.value=item.homeworkText;
      const urlInp=document.createElement('input');urlInp.className='hw-url-inp';urlInp.type='url';urlInp.placeholder='Add a link (optional)';urlInp.value=item.homeworkUrl||'';
      const linkDisp=document.createElement('div');linkDisp.className='hw-link-disp';
      const linkAnchor=document.createElement('a');linkAnchor.className='hw-link-anchor';linkAnchor.target='_blank';linkAnchor.rel='noopener';
      const editBtn=document.createElement('span');editBtn.className='hw-edit-btn';editBtn.textContent='edit';
      linkDisp.appendChild(linkAnchor);linkDisp.appendChild(editBtn);
      cont.appendChild(taHw);cont.appendChild(urlInp);cont.appendChild(linkDisp);
      tdHw.appendChild(cont);row.appendChild(tdHw);

      wireHomeworkWidget(cont,item);
      tbody.appendChild(row);
    }
  }
  resizeAll();
}
buildGrid();

// ── Preview sync ──────────────────────────────────────────────────────────────
function syncPreview(){
  document.getElementById('preview-name').textContent=document.getElementById('studentName').value||'—';
  document.getElementById('preview-month').textContent=document.getElementById('month').value||'—';
  document.getElementById('preview-subject').textContent=document.getElementById('subject').value||'—';
  document.getElementById('preview-grade').textContent='Grade '+document.getElementById('grade').value;
}
['studentName','grade','month','subject','year'].forEach(id=>{
  document.getElementById(id).addEventListener('input',syncPreview);
  document.getElementById(id).addEventListener('change',syncPreview);
});
syncPreview();

// ── Collect / restore state ───────────────────────────────────────────────────
function collectState(){
  return{
    n:document.getElementById('studentName').value,
    g:document.getElementById('grade').value,
    m:document.getElementById('month').value,
    s:document.getElementById('subject').value,
    y:document.getElementById('year').value,
    a:document.getElementById('assessment').value,
    r:grid.map(r=>({c:r.content,o:r.outcomes,h:r.homeworkText,u:r.homeworkUrl}))
  };
}
function applyState(st){
  if(!st)return;
  if(st.n!==undefined)document.getElementById('studentName').value=st.n;
  if(st.g!==undefined)document.getElementById('grade').value=st.g;
  if(st.m!==undefined)document.getElementById('month').value=st.m;
  if(st.s!==undefined)document.getElementById('subject').value=st.s;
  if(st.y!==undefined)document.getElementById('year').value=st.y;
  if(st.a!==undefined)document.getElementById('assessment').value=st.a;
  if(st.r&&st.r.length===grid.length)
    st.r.forEach((r,i)=>{grid[i].content=r.c||'';grid[i].outcomes=r.o||'';grid[i].homeworkText=r.h||'';grid[i].homeworkUrl=r.u||'';});
  buildGrid();syncPreview();
}

// ── Hash encode / decode ──────────────────────────────────────────────────────
function stateToHash(st){
  try{return '#z:'+LZString.compressToEncodedURIComponent(JSON.stringify(st));}catch(e){return '';}
}
function hashToState(hash){
  try{
    if(!hash)return null;
    if(hash.startsWith('#z:')){return JSON.parse(LZString.decompressFromEncodedURIComponent(hash.slice(3)));}
    return null;
  }catch(e){return null;}
}

// Restore from URL on load
(function(){const st=hashToState(location.hash);if(st)applyState(st);})();

// ── Reset ─────────────────────────────────────────────────────────────────────
function handleReset(){
  document.getElementById('studentName').value='';
  document.getElementById('grade').value=5;
  document.getElementById('month').value=MONTHS[new Date().getMonth()];
  document.getElementById('subject').value='English';
  document.getElementById('year').value=new Date().getFullYear();
  document.getElementById('assessment').value='';
  grid.forEach(r=>{r.content='';r.outcomes='';r.homeworkText='';r.homeworkUrl='';});
  buildGrid();syncPreview();
  history.replaceState(null,'',location.pathname+location.search);
  showToast('Cleared','success');
}

// ── URL Shortener ─────────────────────────────────────────────────────────────
async function shortenUrl(longUrl){
  try{const r=await fetch('https://is.gd/create.php?format=json&url='+encodeURIComponent(longUrl),{signal:AbortSignal.timeout(5000)});if(r.ok){const d=await r.json();if(d.shorturl)return{url:d.shorturl,service:'is.gd'};}}catch(e){}
  try{const r=await fetch('https://tinyurl.com/api-create.php?url='+encodeURIComponent(longUrl),{signal:AbortSignal.timeout(5000)});if(r.ok){const t=await r.text();if(t&&t.startsWith('http'))return{url:t.trim(),service:'TinyURL'};}}catch(e){}
  try{const r=await fetch('https://cleanuri.com/api/v1/shorten',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'url='+encodeURIComponent(longUrl),signal:AbortSignal.timeout(5000)});if(r.ok){const d=await r.json();if(d.result_url)return{url:d.result_url,service:'cleanuri'};}}catch(e){}
  return{url:longUrl,service:null};
}

// ── Share ─────────────────────────────────────────────────────────────────────
async function handleShare(){
  const hash=stateToHash(collectState());
  const longUrl=location.origin+location.pathname+location.search+hash;
  const inp=document.getElementById('shareInp');
  const status=document.getElementById('shareStatus');
  const copyBtn=document.getElementById('copyBtn');
  inp.value='⏳ Shortening…';inp.style.color='var(--muted)';
  status.textContent='';status.className='share-status';
  copyBtn.textContent='Copy';copyBtn.classList.remove('copied');
  document.getElementById('shareModal').classList.add('open');
  const{url,service}=await shortenUrl(longUrl);
  inp.value=url;inp.style.color='';
  if(service){status.textContent='✓ Shortened via '+service;status.className='share-status ok';}
  else{status.textContent='Could not shorten — full link ready to copy';status.className='share-status err';}
}
function closeShareModal(e){if(e.target===document.getElementById('shareModal'))document.getElementById('shareModal').classList.remove('open');}
function copyShareLink(){
  const inp=document.getElementById('shareInp');
  if(!inp.value||inp.value.startsWith('⏳'))return;
  inp.select();
  navigator.clipboard.writeText(inp.value).then(()=>{
    const btn=document.getElementById('copyBtn');btn.textContent='✓ Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2200);
  }).catch(()=>{document.execCommand('copy');showToast('Link copied','success');});
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='toast',2800);
}

// ── img → base64 ──────────────────────────────────────────────────────────────
function imgToBase64(imgEl){
  return new Promise(resolve=>{
    if(!imgEl||!imgEl.complete||imgEl.naturalWidth===0)return resolve(null);
    try{const c=document.createElement('canvas');c.width=imgEl.naturalWidth;c.height=imgEl.naturalHeight;c.getContext('2d').drawImage(imgEl,0,0);resolve(c.toDataURL('image/png'));}
    catch(e){fetch(imgEl.src).then(r=>r.blob()).then(blob=>{const rd=new FileReader();rd.onloadend=()=>resolve(rd.result);rd.onerror=()=>resolve(null);rd.readAsDataURL(blob);}).catch(()=>resolve(null));}
  });
}

// ── PDF Export ────────────────────────────────────────────────────────────────
async function handleExport(){
  const name=document.getElementById('studentName').value.trim();
  if(!name){
    const inp=document.getElementById('studentName');inp.classList.add('err');
    setTimeout(()=>inp.classList.remove('err'),1200);
    showToast('Please enter the student name','error');return;
  }
  const btns=[document.getElementById('exportBtn'),document.getElementById('exportBtn2')];
  btns.forEach(b=>{b.disabled=true;b.innerHTML='<span class="spin"></span> Generating…';});
  await new Promise(r=>setTimeout(r,60));

  try{
    const headerLogoB64=await imgToBase64(document.getElementById('headerLogoImg'));
    const footerBannerB64=await imgToBase64(document.getElementById('footerBannerImg'));
    const plan={name,grade:document.getElementById('grade').value,month:document.getElementById('month').value,subject:document.getElementById('subject').value,year:document.getElementById('year').value,assessment:document.getElementById('assessment').value};

    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
    const PW=doc.internal.pageSize.getWidth(); // 841.89
    const PH=doc.internal.pageSize.getHeight(); // 595.28
    const M=18,L=M,TW=PW-M*2;

    const NAVY=[26,58,107],NAVY_DARK=[16,41,81],YELLOW=[245,197,24],RED=[192,57,43];
    const WHITE=[255,255,255],BORDER=[197,213,232],CELL_BG=[247,250,255];
    const BLUE_ROW=[59,130,204],DARK=[26,40,64],MUTED=[107,122,153];
    const ALT_ROW=[240,246,255],LINK=[0,102,204];

    const fillR=(x,y,w,h,c)=>{doc.setFillColor(...c);doc.rect(x,y,w,h,'F');};
    const strokeR=(x,y,w,h,c,lw=0.5)=>{doc.setDrawColor(...c);doc.setLineWidth(lw);doc.rect(x,y,w,h,'S');};
    const hl=(x1,x2,y,c,lw=0.5)=>{doc.setDrawColor(...(c||BORDER));doc.setLineWidth(lw);doc.line(x1,y,x2,y);};
    const vl=(x,y1,y2,c,lw=0.5)=>{doc.setDrawColor(...(c||BORDER));doc.setLineWidth(lw);doc.line(x,y1,x,y2);};
    const dt=(str,x,y,sz,bold,col,align,mw)=>{
      doc.setFontSize(sz);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...col);
      const o=align?{align}:{};if(mw)o.maxWidth=mw;doc.text(String(str||''),x,y,o);
    };

    // ── Section heights ───────────────────────────────────────────────────────
    const usable=PH-M*2; // 559.28 pt

    const H_HDR=56;
    const H_TITLE=20;
    const H_TCOLS=17;
    const H_ABAR=17;
    const H_ABODY=32;
    const H_FOOT=34;
    const H_CHROME=H_HDR+H_TITLE+H_TCOLS+H_ABAR+H_ABODY+H_FOOT; // 176 pt

    // Space available for all 8 lesson rows combined
    const H_ROWS_AVAIL=usable-H_CHROME;

    // Column widths
    const cWK=50,cLES=44,cREM=TW-cWK-cLES;
    const cCON=Math.floor(cREM*0.29),cOUT=Math.floor(cREM*0.37),cHW=cREM-cCON-cOUT;
    const xWK=L,xLES=xWK+cWK,xCON=xLES+cLES,xOUT=xCON+cCON,xHW=xOUT+cOUT,xEND=L+TW;

    // Pick largest font size so ALL wrapped text fits — no truncation.
    // Each row height = tallest column's line-count * lh + 2*CELL_PAD (min 24pt).
    // Total of all 8 row heights must fit inside H_ROWS_AVAIL.
    const CELL_PAD=5;
    const MIN_ROW=22; // never collapse a row below this
    let FS=8.5,rowData;
    for(let fs=8.5;fs>=4.5;fs-=0.25){
      doc.setFontSize(fs);doc.setFont('helvetica','normal');
      const lh=fs*1.32;
      const rd=grid.map(item=>{
        // Full wrap — NO slice
        const cL=item.content  ?doc.splitTextToSize(item.content,  cCON-8):[];
        const oL=item.outcomes ?doc.splitTextToSize(item.outcomes, cOUT-8):[];
        const hL=item.homeworkText?doc.splitTextToSize(item.homeworkText,cHW-8):[];
        const maxLines=Math.max(cL.length||1,oL.length||1,hL.length||1);
        const rowH=Math.max(MIN_ROW, maxLines*lh + CELL_PAD*2);
        return{cL,oL,hL,homeworkUrl:item.homeworkUrl||'',lh,rowH};
      });
      const totalH=rd.reduce((s,r)=>s+r.rowH,0);
      if(totalH<=H_ROWS_AVAIL){FS=fs;rowData=rd;break;}
      if(fs<=4.5){FS=fs;rowData=rd;} // use smallest size as last resort
    }

    let Y=M;

    // 1. Header
    const LOGO_W=155;
    fillR(L,Y,LOGO_W,H_HDR,CELL_BG);
    if(headerLogoB64){
      const img=document.getElementById('headerLogoImg');
      const nw=img.naturalWidth||LOGO_W,nh=img.naturalHeight||H_HDR;
      const ratio=Math.min((LOGO_W-14)/nw,(H_HDR-10)/nh);
      doc.addImage(headerLogoB64,'PNG',L+(LOGO_W-nw*ratio)/2,Y+(H_HDR-nh*ratio)/2,nw*ratio,nh*ratio);
    }
    const infoX=L+LOGO_W,nF=4,fW=(TW-LOGO_W)/nF;
    const lbH=Math.round(H_HDR*0.38),vlH=H_HDR-lbH;
    [{l:'STUDENT NAME',v:plan.name},{l:'MONTH',v:plan.month},{l:'SUBJECT',v:plan.subject},{l:'GRADE',v:'Grade '+plan.grade}]
    .forEach((f,i)=>{
      const fx=infoX+fW*i;
      fillR(fx,Y,fW,lbH,NAVY);dt(f.l,fx+fW/2,Y+lbH/2+3,6.5,true,WHITE,'center');
      fillR(fx,Y+lbH,fW,vlH,WHITE);dt(f.v||'—',fx+fW/2,Y+lbH+vlH/2+3.5,i===0?7:9.5,true,RED,'center',fW-8);
    });
    strokeR(L,Y,TW,H_HDR,BORDER);vl(infoX,Y,Y+H_HDR,BORDER);hl(infoX,xEND,Y+lbH,BORDER);
    for(let i=1;i<nF;i++)vl(infoX+fW*i,Y,Y+H_HDR,BORDER);
    Y+=H_HDR;

    // 2. Title bar
    fillR(L,Y,TW,H_TITLE,NAVY);dt('Monthly Plan',L+TW/2,Y+H_TITLE/2+4,11,true,WHITE,'center');Y+=H_TITLE;

    // 3. Column headers — Timeline cell has no border; Content/Outcomes/Homework do
    const tblTop=Y;
    fillR(L,Y,TW,H_TCOLS,CELL_BG);
    [{l:'Timeline',x:xWK,w:cWK+cLES},{l:'Content',x:xCON,w:cCON},{l:'Learning Outcomes',x:xOUT,w:cOUT},{l:'Homework',x:xHW,w:cHW}]
    .forEach(c=>dt(c.l,c.x+c.w/2,Y+H_TCOLS/2+3,7.5,true,BLUE_ROW,'center'));
    // Draw borders only around Content/Outcomes/Homework — not the Timeline cell
    strokeR(xCON,Y,TW-(xCON-L),H_TCOLS,BORDER);
    [xOUT,xHW].forEach(x=>vl(x,Y,Y+H_TCOLS,BORDER));
    Y+=H_TCOLS;

    // 4. Data rows — each row is exactly tall enough to show all wrapped text
    for(let w=0;w<4;w++){
      const r0=rowData[w*2],r1=rowData[w*2+1];
      const wkH=r0.rowH+r1.rowH,wkY=Y;
      if(w%2===1)fillR(L,wkY,TW,wkH,ALT_ROW);
      fillR(xWK,wkY,cWK,wkH,CELL_BG);
      dt('Week '+(w+1),xWK+cWK/2,wkY+wkH/2+FS*0.38,FS,true,NAVY,'center');
      let lesY=wkY;
      for(let l=0;l<2;l++){
        const row=rowData[w*2+l];
        const item=grid[w*2+l];
        const rH=row.rowH;
        const textY=lesY+CELL_PAD+FS;
        fillR(xLES,lesY,cLES,rH,l===0?CELL_BG:WHITE);
        dt('Lesson '+(l+1),xLES+cLES/2,lesY+rH/2+FS*0.38,FS,false,DARK,'center');
        doc.setFontSize(FS);doc.setFont('helvetica','normal');doc.setTextColor(...DARK);
        if(row.cL.length)doc.text(row.cL,xCON+5,textY);
        if(row.oL.length)doc.text(row.oL,xOUT+5,textY);
        // Homework — clickable if URL present
        const hasLink=item.homeworkUrl&&item.homeworkUrl.startsWith('http');
        doc.setTextColor(...(hasLink?LINK:DARK));
        if(row.hL.length){
          const lineH=FS*1.15;
          row.hL.forEach((line,i)=>doc.text(line,xHW+5,textY+i*lineH));
          if(hasLink){
            const uy=textY+row.hL.length*lineH-FS*0.2;
            doc.setDrawColor(...LINK);doc.setLineWidth(0.6);doc.line(xHW+5,uy,xHW+cHW-6,uy);
            doc.link(xHW+4,textY-FS*0.85,cHW-8,row.hL.length*lineH+FS*0.5,{url:item.homeworkUrl});
          }
        }
        if(l===0)hl(xCON,xEND,lesY+rH,BORDER,0.35);
        lesY+=rH;
      }
      hl(L,xEND,wkY+wkH,BORDER,0.8);Y+=wkH;
    }
    const tblBot=Y;
    // Content/Outcomes/Homework internal vertical lines
    [xCON,xOUT,xHW].forEach(x=>vl(x,tblTop,tblBot,BORDER,0.5));
    // Outer table border lines only — no divider inside the Timeline column
    vl(xEND,tblTop,tblBot,BORDER,0.8);
    hl(L,xEND,tblTop,BORDER,0.8);

    // 5. Assessment bar
    fillR(L,Y,TW,H_ABAR,YELLOW);strokeR(L,Y,TW,H_ABAR,BORDER,0.5);
    dt('Assessment',L+TW/2,Y+H_ABAR/2+4,9.5,true,NAVY_DARK,'center');Y+=H_ABAR;

    // 6. Assessment body
    fillR(L,Y,TW,H_ABODY,WHITE);strokeR(L,Y,TW,H_ABODY,BORDER,0.8);
    if(plan.assessment){
      doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(...DARK);
      const aL=doc.splitTextToSize(plan.assessment,TW-16);
      doc.text(aL.slice(0,Math.max(1,Math.floor((H_ABODY-6)/9))),L+8,Y+9);
    }else{
      doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(...MUTED);
      doc.text('No assessment notes entered.',L+8,Y+11);
    }
    Y+=H_ABODY;

    // 7. Footer
    fillR(L,Y,TW,H_FOOT,WHITE);strokeR(L,Y,TW,H_FOOT,BORDER,0.8);
    if(footerBannerB64){
      const img=document.getElementById('footerBannerImg');
      const nw=img.naturalWidth||TW,nh=img.naturalHeight||H_FOOT;
      const ratio=Math.min((TW-14)/nw,(H_FOOT-6)/nh);
      doc.addImage(footerBannerB64,'PNG',L+(TW-nw*ratio)/2,Y+(H_FOOT-nh*ratio)/2,nw*ratio,nh*ratio);
    }

    doc.save(`ilearn-monthly-plan-${plan.name.toLowerCase().replace(/\s+/g,'-')}-${(plan.month||'').toLowerCase()}.pdf`);
    showToast('PDF downloaded – homework links are clickable!','success');

  }catch(err){console.error(err);showToast('Export failed – check console','error');}

  btns.forEach(b=>{b.disabled=false;b.innerHTML='↓ Export PDF';});
}
</script>
